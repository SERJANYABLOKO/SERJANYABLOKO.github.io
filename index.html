<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TG Bot Studio | Создание и продвижение ботов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 100px;
            color: #fff;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
        }

        /* Шапка */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .header h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            font-size: 12px;
            font-weight: 600;
            margin-top: 12px;
        }

        /* Карточка услуги */
        .service-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.3s;
        }

        .service-card:hover {
            transform: translateY(-3px);
            background: rgba(255,255,255,0.15);
            border-color: rgba(0,210,255,0.5);
        }

        .service-header {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .service-icon {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .service-title {
            font-size: 20px;
            font-weight: 700;
        }

        .service-desc {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            line-height: 1.4;
        }

        .service-features {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 5px;
        }

        .feature-tag {
            background: rgba(0,210,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #00d2ff;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .price {
            font-size: 26px;
            font-weight: 800;
            color: #00d2ff;
        }

        .price-old {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            text-decoration: line-through;
            margin-left: 10px;
        }

        .buy-btn {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            border: none;
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,210,255,0.3);
        }

        .buy-btn:active {
            transform: scale(0.95);
        }

        /* Корзина */
        .cart-section {
            margin-top: 30px;
        }

        .cart-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cart-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-item-name {
            font-weight: 600;
            font-size: 15px;
        }

        .cart-item-price {
            font-size: 13px;
            color: #00d2ff;
        }

        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .quantity-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }

        .quantity-btn:active {
            transform: scale(0.9);
        }

        .remove-item {
            background: rgba(255,107,107,0.8);
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
            margin-left: 12px;
        }

        .empty-cart {
            text-align: center;
            color: rgba(255,255,255,0.6);
            padding: 30px;
        }

        /* Нижняя панель */
        .cart-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(20,20,40,0.98);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 100;
            border: 1px solid rgba(0,210,255,0.3);
        }

        .cart-total-price {
            font-size: 26px;
            font-weight: 800;
            color: #00d2ff;
        }

        .cart-total-label {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }

        .checkout-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border: none;
            color: white;
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(56,239,125,0.3);
        }

        .checkout-btn:active {
            transform: scale(0.96);
        }

        /* Модальное окно для контактов */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: #1a1a2e;
            border-radius: 32px;
            padding: 28px;
            max-width: 340px;
            width: 90%;
            border: 1px solid rgba(0,210,255,0.3);
        }

        .modal-content h3 {
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-content input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 15px;
        }

        .modal-content input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }

        .send-order {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            border: none;
            color: white;
        }

        .cancel-order {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }

        /* Уведомление */
        .toast {
            position: fixed;
            top: 100px;
            left: 20px;
            right: 20px;
            background: #1a1a2e;
            color: white;
            text-align: center;
            padding: 14px;
            border-radius: 60px;
            font-size: 14px;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            z-index: 200;
            max-width: 300px;
            margin: 0 auto;
            border: 1px solid #00d2ff;
        }

        .toast.show {
            opacity: 1;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .service-card {
            animation: fadeInUp 0.4s ease forwards;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🤖 TG Bot Studio</h1>
        <p>Профессиональная разработка Telegram ботов</p>
        <div class="badge">⚡ Создание · Хостинг · Продвижение</div>
    </div>

    <div id="services-list"></div>

    <div class="cart-section">
        <div class="cart-title">🛒 Корзина</div>
        <div id="cart-block" class="cart-card"></div>
    </div>
</div>

<div id="cart-bar" class="cart-bar" style="display: none;">
    <div>
        <div class="cart-total-label">Итого</div>
        <div class="cart-total-price"><span id="cart-total">0</span> ₽</div>
    </div>
    <button id="checkout-button" class="checkout-btn">Оформить заказ →</button>
</div>

<div id="toast-message" class="toast">✓ Добавлено</div>

<!-- Модальное окно для контактов -->
<div id="contact-modal" class="modal">
    <div class="modal-content">
        <h3>📋 Оформление заказа</h3>
        <input type="text" id="client-name" placeholder="Ваше имя" autocomplete="off">
        <input type="text" id="client-phone" placeholder="Telemas (или номер телефона)" autocomplete="off">
        <div class="modal-buttons">
            <button class="cancel-order" onclick="closeModal()">Отмена</button>
            <button class="send-order" onclick="sendOrderToTelegram()">Отправить</button>
        </div>
    </div>
</div>

<script>
    // УСЛУГИ
    const services = [
        { id: 1, name: "🤖 Создание TG бота", description: "Бот под ключ любой сложности. Админ-панель, база данных, любые функции.", price: 14900, oldPrice: 24900, features: ["Любая тематика", "Админ-панель", "Исходный код"] },
        { id: 2, name: "🚀 Установка на хостинг", description: "Размещение бота на сервере. Круглосуточная работа.", price: 3900, oldPrice: 7900, features: ["24/7 работа", "Бекапы", "Поддержка"] },
        { id: 3, name: "📈 Продвижение бота", description: "Привлечение пользователей, реклама, раскрутка.", price: 9900, oldPrice: 19900, features: ["Таргет", "Чаты", "SEO"] },
        { id: 4, name: "🎯 Комбо — Всё вместе", description: "Создание + хостинг на год + продвижение. Экономия 40%", price: 24900, oldPrice: 43700, features: ["Полный пакет", "Экономия", "Приоритет"] }
    ];

    let cart = [];

    // Отрисовка услуг
    function renderServices() {
        const container = document.getElementById('services-list');
        container.innerHTML = '';
        
        services.forEach((service, index) => {
            const card = document.createElement('div');
            card.className = 'service-card';
            card.style.animationDelay = `${index * 0.05}s`;
            card.innerHTML = `
                <div class="service-header">
                    <div class="service-icon">${service.name.split(' ')[0]}</div>
                    <div>
                        <div class="service-title">${service.name}</div>
                        <div class="service-desc">${service.description}</div>
                    </div>
                </div>
                <div class="service-features">
                    ${service.features.map(f => `<span class="feature-tag">✓ ${f}</span>`).join('')}
                </div>
                <div class="price-row">
                    <div>
                        <span class="price">${service.price.toLocaleString()} ₽</span>
                        ${service.oldPrice ? `<span class="price-old">${service.oldPrice.toLocaleString()} ₽</span>` : ''}
                    </div>
                    <button class="buy-btn" data-id="${service.id}">Купить</button>
                </div>
            `;
            container.appendChild(card);
        });

        document.querySelectorAll('.buy-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                addToCart(id);
            });
        });
    }

    function addToCart(serviceId) {
        const service = services.find(s => s.id === serviceId);
        const existing = cart.find(item => item.id === serviceId);
        if (existing) {
            existing.quantity += 1;
        } else {
            cart.push({ id: serviceId, name: service.name, price: service.price, quantity: 1 });
        }
        updateCartUI();
        showToast(`✓ ${service.name.split(' ')[1] || 'Услуга'} добавлена`);
    }

    function removeFromCart(serviceId) {
        cart = cart.filter(item => item.id !== serviceId);
        updateCartUI();
        showToast('🗑 Удалено из корзины');
    }

    function updateQuantity(serviceId, delta) {
        const item = cart.find(item => item.id === serviceId);
        if (item) {
            item.quantity += delta;
            if (item.quantity <= 0) {
                removeFromCart(serviceId);
            } else {
                updateCartUI();
            }
        }
    }

    function getTotalSum() {
        return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    }

    function updateCartUI() {
        const cartBlock = document.getElementById('cart-block');
        const cartBar = document.getElementById('cart-bar');
        const totalSpan = document.getElementById('cart-total');

        const total = getTotalSum();
        if (totalSpan) totalSpan.innerText = total.toLocaleString();

        if (cart.length === 0) {
            cartBar.style.display = 'none';
            cartBlock.innerHTML = '<div class="empty-cart">🛍 Корзина пуста<br><span style="font-size: 12px;">Выберите услугу для заказа</span></div>';
        } else {
            cartBar.style.display = 'flex';
            let cartHtml = '';
            for (let item of cart) {
                const service = services.find(s => s.id === item.id);
                if (service) {
                    cartHtml += `
                        <div class="cart-item">
                            <div>
                                <div class="cart-item-name">${service.name}</div>
                                <div class="cart-item-price">${service.price.toLocaleString()} ₽</div>
                            </div>
                            <div class="cart-item-quantity">
                                <button class="quantity-btn" data-id="${item.id}" data-delta="-1">−</button>
                                <span style="min-width: 30px; text-align: center;">${item.quantity}</span>
                                <button class="quantity-btn" data-id="${item.id}" data-delta="1">+</button>
                                <button class="remove-item" data-id="${item.id}">Удалить</button>
                            </div>
                        </div>
                    `;
                }
            }
            cartHtml += `<div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); text-align: right; font-weight: 700;">
                            Итого: ${total.toLocaleString()} ₽
                         </div>`;
            cartBlock.innerHTML = cartHtml;

            document.querySelectorAll('.quantity-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = parseInt(btn.getAttribute('data-id'));
                    const delta = parseInt(btn.getAttribute('data-delta'));
                    updateQuantity(id, delta);
                });
            });

            document.querySelectorAll('.remove-item').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = parseInt(btn.getAttribute('data-id'));
                    removeFromCart(id);
                });
            });
        }
    }

    // Открыть модальное окно
    function openModal() {
        document.getElementById('contact-modal').classList.add('active');
    }

    function closeModal() {
        document.getElementById('contact-modal').classList.remove('active');
        document.getElementById('client-name').value = '';
        document.getElementById('client-phone').value = '';
    }

    // Отправка заказа в Telegram
    async function sendOrderToTelegram() {
        const name = document.getElementById('client-name').value.trim();
        const phone = document.getElementById('client-phone').value.trim();

        if (!name || !phone) {
            showToast('⚠️ Заполните имя и контакт');
            return;
        }

        if (cart.length === 0) {
            showToast('Корзина пуста');
            closeModal();
            return;
        }

        const total = getTotalSum();
        const items = cart.map(item => {
            const service = services.find(s => s.id === item.id);
            return `${service.name} × ${item.quantity} = ${(service.price * item.quantity).toLocaleString()} ₽`;
        }).join('\n• ');

        const message = `🆕 НОВЫЙ ЗАКАЗ!\n\n👤 Имя: ${name}\n📞 Контакт: ${phone}\n\n🛒 Состав заказа:\n• ${items}\n\n💰 Итого: ${total.toLocaleString()} ₽\n\n🕐 Время: ${new Date().toLocaleString()}`;

        // Отправляем через бота-посредника
        const BOT_TOKEN = '8128766310:AAElU3rQfLkPxLvDvZiE6X5Y0JxLcN7PqZw'; // ТОКЕН ВАШЕГО БОТА
        const CHAT_ID = '8164402727'; // ID @serjantyabloko (получите через @userinfobot)

        try {
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'HTML' })
            });
            const result = await response.json();
            if (result.ok) {
                showToast('✅ Заказ отправлен! Свяжемся с вами');
                cart = [];
                updateCartUI();
                closeModal();
            } else {
                showToast('❌ Ошибка, попробуйте позже');
            }
        } catch (error) {
            console.error(error);
            showToast('❌ Ошибка отправки');
        }
    }

    function showToast(message) {
        const toast = document.getElementById('toast-message');
        toast.innerText = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // Обработчик кнопки "Оформить заказ"
    document.getElementById('checkout-button').addEventListener('click', () => {
        if (cart.length === 0) {
            showToast('Корзина пуста');
        } else {
            openModal();
        }
    });

    // Telegram WebApp
    if (window.Telegram && Telegram.WebApp) {
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        Telegram.WebApp.setHeaderColor('#0f0c29');
    }

    renderServices();
    updateCartUI();
</script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
