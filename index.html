<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор сайта | Serjanyabloko</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0d0f14 0%, #05080c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #eaeef2;
        }

        .container {
            max-width: 700px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #6fc3ff, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #8896b0;
            margin-bottom: 40px;
        }

        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 500px) {
            .cards {
                grid-template-columns: 1fr;
                gap: 16px;
            }
        }

        .card {
            background: #161c26;
            border-radius: 32px;
            padding: 30px 24px 28px;
            border: 1px solid #28303e;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .card:hover {
            transform: translateY(-6px);
            border-color: #6fc3ff;
            box-shadow: 0 16px 40px rgba(111, 195, 255, 0.15);
            background: #1b232f;
        }

        .card-icon {
            font-size: 3.8rem;
            margin-bottom: 12px;
            display: block;
        }

        .card-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .card-desc {
            font-size: 0.95rem;
            color: #96a3bb;
            line-height: 1.5;
        }

        .card-badge {
            display: inline-block;
            margin-top: 14px;
            background: #1f2a38;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #b0c7e0;
        }

        .card-minecraft .card-title {
            color: #6fc3ff;
        }

        .card-studio .card-title {
            color: #fbbf24;
        }

        .footer-link {
            margin-top: 36px;
            color: #5c6b84;
            font-size: 0.9rem;
        }

        .footer-link a {
            color: #6fc3ff;
            text-decoration: none;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }

        .card {
            animation: fadeUp 0.6s ease both;
        }
        .card:nth-child(2) {
            animation-delay: 0.15s;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">🚀 Serjanyabloko</div>
        <div class="subtitle">Выберите проект, который хотите открыть</div>

        <div class="cards">
            <a href="minecraft.html" class="card card-minecraft">
                <span class="card-icon">⛏️</span>
                <div class="card-title">MVP Craft</div>
                <div class="card-desc">Minecraft сервер с уникальными режимами и дружным комьюнити</div>
                <span class="card-badge">🎮 Игровой сервер</span>
            </a>

            <a href="studio.html" class="card card-studio">
                <span class="card-icon">🤖</span>
                <div class="card-title">Serjant Studio</div>
                <div class="card-desc">Разработка и продвижение Telegram ботов под ключ</div>
                <span class="card-badge">💻 Студия разработки</span>
            </a>
        </div>

        <div class="footer-link">
            🌐 Все проекты · <a href="https://github.com/SERJANYABLOKO" target="_blank">GitHub</a>
        </div>
    </div>

</body>
</html>
